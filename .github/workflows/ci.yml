name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Dev toolchain requires Node 20+ (vitest@4 imports node:util.styleText,
        # added in 20). Published bundles still target node18 via tsup, so
        # consumers running Node 18 are unaffected.
        node: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        # Version is read from the "packageManager" field in package.json.
        uses: pnpm/action-setup@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          # Skip the optional Chromium download — we don't run the OG
          # screenshot path in CI.
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      # Build first so @deloc/shared's dist/index.d.ts exists when
      # @deloc/cli and @deloc/mcp typecheck their `@deloc/shared` imports.
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r exec tsc --noEmit

      - name: Test
        run: pnpm -r test
